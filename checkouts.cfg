[buildout]
always-checkout = force
auto-checkout +=
    collective.compoundcriterion
    collective.documentviewer
    collective.eeafaceted.batchactions
    collective.eeafaceted.dashboard
    collective.eeafaceted.z3ctable
    collective.iconifiedcategory
    collective.js.iframeresizer
    collective.js.tooltipster
    collective.z3cform.select2
    collective.dms.scanbehavior
    imio.actionspanel
    imio.dashboard
    imio.history
    plone.formwidget.masterselect

[remotes]
imio = https://github.com/imio
imio_push = git@github.com:imio
plone = https://github.com/plone
plone_push = git@github.com:plone
ftw = https://github.com/4teamwork
ftw_push = git@github.com:4teamwork
zopefoundation = https://github.com/zopefoundation
zopefoundation_push = git@github.com:zopefoundation
zopesvn = svn://svn.zope.org/repos/main/
collective = https://github.com/collective
collective_push = git@github.com:collective

[sources]
collective.iconifiedcategory = git ${remotes:imio}/collective.iconifiedcategory.git pushurl=${remotes:imio_push}/collective.iconifiedcategory.git branch=python3
collective.documentviewer = git ${remotes:collective}/collective.documentviewer.git pushurl=${remotes:collective_push}/collective.documentviewer.git branch=plone6
collective.eeafaceted.batchactions = git ${remotes:imio}/collective.eeafaceted.batchactions.git pushurl=${remotes:imio_push}/collective.eeafaceted.batchactions.git branch=python3
collective.z3cform.select2 = git ${remotes:imio}/collective.z3cform.select2.git pushurl=${remotes:imio_push}/collective.z3cform.select2.git branch=single-select
collective.eeafaceted.z3ctable = git ${remotes:imio}/collective.eeafaceted.z3ctable.git pushurl=${remotes:imio_push}/collective.eeafaceted.z3ctable.git branch=plone6
collective.dms.scanbehavior = git ${remotes:collective}/collective.dms.scanbehavior.git pushurl=${remotes:collective_push}/collective.dms.scanbehavior.git branch=python3
imio.actionspanel = git ${remotes:imio}/imio.actionspanel.git pushurl=${remotes:imio_push}/imio.actionspanel.git branch=plone6
collective.compoundcriterion = git ${remotes:collective}/collective.compoundcriterion.git pushurl=${remotes:collective_push}/collective.compoundcriterion.git branch=plone6
collective.js.iframeresizer = git ${remotes:collective}/collective.js.iframeresizer.git pushurl=${remotes:collective_push}/collective.js.iframeresizer.git
collective.js.tooltipster = git ${remotes:collective}/collective.js.tooltipster.git pushurl=${remotes:collective_push}/collective.js.tooltipster.git branch=plone61
collective.eeafaceted.dashboard = git ${remotes:imio}/collective.eeafaceted.dashboard.git pushurl=${remotes:imio_push}/collective.eeafaceted.dashboard.git branch=plone6
plone.formwidget.masterselect = git ${remotes:collective}/plone.formwidget.masterselect.git pushurl=${remotes:collective_push}/plone.formwidget.masterselect.git branch=plone6_compatibility
imio.dashboard = git ${remotes:imio}/imio.dashboard.git pushurl=${remotes:imio_push}/imio.dashboard.git branch=python3
imio.history = git ${remotes:imio}/imio.history.git pushurl=${remotes:imio_push}/imio.history.git branch=plone6
